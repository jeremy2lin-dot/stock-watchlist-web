<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>個股監控名單 Web</title>
  <link rel="stylesheet" href="/static/style.css?v=20260501-1">
</head>
<body>
  <main class="container">
    <h1>個股監控名單 Web</h1>
    <div class="actions">
      <label for="providerSelect">資料來源</label>
      <select id="providerSelect"></select>
      <button id="addRowBtn" type="button">新增一列</button>
      <button id="importExcelBtn" type="button">從 Excel 匯入</button>
      <input id="excelFileInput" type="file" accept=".xlsx,.xlsm" hidden>
      <button id="saveBtn" type="button">保存</button>
      <button id="updateBtn" class="primary" type="button">UPDATE NOW</button>
    </div>
    <p id="status"></p>
    <div class="table-wrap">
      <table id="watchTable">
        <thead>
          <tr>
            <th>觀察日期</th><th>股票代號</th><th>股票名稱</th><th>現價</th>
            <th>5MA</th><th>10MA</th><th>20MA</th><th>50MA</th>
            <th>進場價</th><th>停損價</th><th>停利價</th>
            <th>Action</th><th>Trend</th><th class="strategy-header">Strategy</th><th>策略狀態</th>
            <th class="notes-header">註記</th><th>最後更新</th><th>系統備註</th><th>操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>
  <script src="/static/app.js?v=20260501-1"></script>
</body>
</html>
